# Air live-reload configuration for GitX.
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./bin/gitx"
  cmd = "go build -o ./bin/gitx ./cmd/gitx/"
  delay = 100
  exclude_dir = ["bin", "tmp", "test", ".git", ".github", ".pi", "docs"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "yaml", "yml", "toml"]
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = "cyan"
  build = "yellow"
  main = "green"
  runner = "magenta"
  watcher = "blue"

[log]
  main_only = false
  time = false
